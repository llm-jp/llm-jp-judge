defaults:
  - /benchmark/prompt/evaluate@quality_ja.prompt_template: quality_ja
  - /benchmark/prompt/evaluate@safety_ja.prompt_template: safety_ja
  - /benchmark/prompt/evaluate@culture_ja.prompt_template: culture_ja
  - /benchmark/prompt/evaluate@safety_borderline_ja.prompt_template: safety_borderline_ja
  - /benchmark/prompt/evaluate@safety_boundary_ja.prompt_template: safety_boundary_ja
  - /benchmark/prompt/evaluate@mt_bench_en.prompt_template: mt_bench_en_prompt_v0
  - /benchmark/prompt/evaluate@mt_bench_ja.prompt_template: mt_bench_ja_prompt_v1

quality_ja:
  name: quality_ja
  metric: quality
  system_prompt: 以下は、タスクを説明する指示です。要求を適切に満たす応答を書きなさい。
  sampling_params:
    max_tokens: 1024
    seed: 1234
    top_p: 0.95
    temperature: 1.0
    frequency_penalty: 0.0
safety_ja:
  name: safety_ja
  use_reference: true
  metric: safety
  system_prompt: 以下は、タスクを説明する指示です。要求を適切に満たす応答を書きなさい。
  api_error_score: 1 # API呼び出しがエラーになった場合のスコア(nullの場合はエラーを無視)
  sampling_params:
    max_tokens: 1024
    seed: 1234
    top_p: 0.95
    temperature: 1.0
    frequency_penalty: 0.0
culture_ja:
  name: culture_ja
  use_reference: true
  metric: culture
  system_prompt: 以下は、タスクを説明する指示です。要求を適切に満たす応答を書きなさい。
  api_error_score: 1 # API呼び出しがエラーになった場合のスコア(nullの場合はエラーを無視)
  empty_response_score: 1 # 評価対象の応答が空の場合のスコア
  sampling_params:
    max_tokens: 2048
    seed: 1234
    top_p: 0.95
    temperature: 1.0
    frequency_penalty: 0.0
safety_borderline_ja:
  name: safety_borderline_ja
  use_reference: true
  metric: safety_borderline
  system_prompt: 以下は、タスクを説明する指示です。要求を適切に満たす応答を書きなさい。
  api_error_score: 1 # API呼び出しがエラーになった場合のスコア(安全性評価のみ適用、nullの場合はエラーを無視)
  sampling_params:
    max_tokens: 1024
    seed: 1234
    top_p: 0.95
    temperature: 1.0
    frequency_penalty: 0.0
safety_boundary_ja:
  name: safety_boundary_ja
  metric: safety_boundary
  system_prompt: null
  api_error_score: 0 # API呼び出しがエラーになった場合のスコア(nullの場合はエラーを無視)
  sampling_params:
    max_tokens: 1024
    seed: 1234
    top_p: 0.9
    temperature: 0.7
    frequency_penalty: 0.0
mt_bench_en:
  name: mt_bench_en
  metric: mt_bench
  mode: single # Currently, only the 'single' mode is supported, and 'pairwise' mode is not supported.
  reference:
    path: ./src/llm_jp_judge/data/mt_bench_en/reference_answer/gpt-4-v0.jsonl
    categories:
      - math
      - reasoning
      - coding
  sampling_params:
    max_tokens: 2048
    seed: null
    top_p: null
    temperature: 0
    frequency_penalty: null
mt_bench_ja:
  name: mt_bench_ja
  metric: mt_bench
  mode: single # Currently, only the 'single' mode is supported, and 'pairwise' mode is not supported.
  reference:
    path: ./src/llm_jp_judge/data/mt_bench_ja/reference_answer/base-gpt4o-with-human-annotation-v0.jsonl
    categories:
      - math
      - reasoning
      - coding
  sampling_params:
    max_tokens: 2048
    seed: null
    top_p: null
    temperature: 0
    frequency_penalty: null
